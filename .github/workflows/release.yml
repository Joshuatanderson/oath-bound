name: Release CLI

on:
  push:
    branches: [main]
    paths: ['cli/**']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from cli.ts
        id: version
        run: |
          VERSION=$(grep "^const VERSION" cli/cli.ts | sed "s/.*'\(.*\)'.*/\1/")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version already published
        id: check
        run: |
          if npm view oathbound@${{ steps.version.outputs.version }} version 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.check.outputs.exists == 'false'

      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'false'
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'

      - run: cd cli && bun install --frozen-lockfile
        if: steps.check.outputs.exists == 'false'

      - run: cd cli && bun test
        if: steps.check.outputs.exists == 'false'

      - run: cd cli && bun run build
        if: steps.check.outputs.exists == 'false'

      - name: Verify bundle runs on Node
        if: steps.check.outputs.exists == 'false'
        run: node cli/dist/cli.cjs --version

      - run: cd cli && npm publish --provenance --access public
        if: steps.check.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
