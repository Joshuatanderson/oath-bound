name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
        working-directory: cli

      - name: Run tests
        working-directory: cli
        run: bun test

      - name: Build binaries
        working-directory: cli
        run: |
          mkdir -p dist
          bun build ./cli.ts --compile --target=bun-darwin-arm64 --outfile dist/oathbound-darwin-arm64
          bun build ./cli.ts --compile --target=bun-darwin-x64 --outfile dist/oathbound-darwin-x64
          bun build ./cli.ts --compile --target=bun-linux-x64 --outfile dist/oathbound-linux-x64
          bun build ./cli.ts --compile --target=bun-linux-arm64 --outfile dist/oathbound-linux-arm64
          bun build ./cli.ts --compile --target=bun-windows-x64 --outfile dist/oathbound-windows-x64.exe
          bun build ./cli.ts --compile --target=bun-windows-arm64 --outfile dist/oathbound-windows-arm64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cli/dist/*
          generate_release_notes: true

  npm-publish:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'

      - name: Publish to npm
        working-directory: cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
